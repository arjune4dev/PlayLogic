<!DOCTYPE html>
<html>
<head>
    <title>Football Multi-Agent</title>
    <style>
        canvas { border:1px solid #ccc; }
    </style>
</head>
<body>
    <canvas id="field" width="800" height="520"></canvas>
    <script>
        const FIELD_W = 105, FIELD_H = 68;
        const scaleX = 800/FIELD_W, scaleY = 520/FIELD_H;
        const ctx = document.getElementById("field").getContext("2d");

        async function reset() {
            const res = await fetch('/reset', {method:'POST'});
            return await res.json();
        }

        async function step(actions) {
            const res = await fetch('/step', {
                method:'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({action: JSON.stringify(actions)})
            });
            return await res.json();
        }

        function draw(state) {
            ctx.clearRect(0,0,800,520);
            // Draw field lines
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            // pitch
            ctx.strokeRect(0,0,800,520);
            // centre circle
            ctx.beginPath();
            ctx.arc(52.5*scaleX, 34*scaleY, 9.15*scaleX, 0, 2*Math.PI);
            ctx.stroke();
            // Draw players
            state.players.forEach(p => {
                const x = p.pos[0]*scaleX, y = p.pos[1]*scaleY;
                ctx.fillStyle = p.team==='A' ? 'red' : 'blue';
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, 2*Math.PI);
                ctx.fill();
                if(p.has_ball) {
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(x, y, 3, 0, 2*Math.PI);
                    ctx.fill();
                }
            });
            // Draw ball
            const b = state.ball.pos;
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(b[0]*scaleX, b[1]*scaleY, 3, 0, 2*Math.PI);
            ctx.fill();
        }

        (async function loop() {
            let data = await reset();
            draw(data.state);
            // Simulate with random actions (replace with your trained model)
            setInterval(async () => {
                let actions = {};
                for(let i=0; i<22; i++) {
                    actions[i] = "MOVE " + (Math.random()*2-1)*8 + " " + (Math.random()*2-1)*8;
                }
                let result = await step(actions);
                if(result.done) {
                    data = await reset();
                } else {
                    draw(result.state);
                }
            }, 100);
        })();
    </script>
</body>
</html>
